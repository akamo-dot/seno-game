<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENO — PLAY</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,900&family=Rajdhani:wght@500;600;700&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --yellow: #F5B700;
  --orange: #FF5C00;
  --red:    #E8003A;
  --black:  #0A0A0A;
  --dark:   #111111;
  --dark2:  #181818;
  --border: #252525;
  --white:  #F2EFE9;
  --mid:    #C8C6C1;
  --dim:    #888680;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { background:var(--black); }
body {
  background:var(--black); color:var(--white);
  font-family:'Barlow Condensed','Noto Sans JP',sans-serif;
  min-height:100vh; overflow-x:hidden; max-width:480px; margin:0 auto;
}

/* ── HEADER ── */
header {
  position:sticky; top:0; z-index:50;
  background:var(--black); border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; padding:10px 18px;
}
.header-logo { height:28px; display:block; }
header a { text-decoration:none; }
.tagline { font-size:10px; letter-spacing:3px; color:var(--dim); text-transform:uppercase; }

/* ── TABS ── */
.tabs {
  display:flex; position:sticky; top:49px; z-index:49;
  background:var(--black); border-bottom:1px solid var(--border);
}
.tab {
  flex:1; padding:12px 4px; text-align:center;
  font-size:10px; letter-spacing:2px; font-weight:700; text-transform:uppercase;
  color:var(--dim); cursor:pointer; border-bottom:2px solid transparent; transition:all .2s;
}
.tab.active { color:var(--orange); border-bottom-color:var(--orange); }

/* ── VIEWS ── */
.view { display:none; padding:20px 16px 80px; background:var(--black); }
.view.active { display:block; }

/* ════ GLOBAL TAB ════ */
.global-hero { text-align:center; padding:32px 0 24px; }

.global-label { font-size:10px; letter-spacing:5px; color:var(--dim); text-transform:uppercase; margin-bottom:12px; }

/* Slot machine counter */
.slot-counter-wrap {
  display:flex; justify-content:center; align-items:center;
  gap:1px; margin:0 auto 12px; min-height:56px;
}
.slot-digit {
  position:relative; width:30px; height:50px;
  overflow:hidden; border-radius:5px;
  background:linear-gradient(180deg,#0a0000 0%,#1a0400 50%,#0a0000 100%);
  border:1px solid #3a1a00;
  box-shadow:0 0 12px rgba(255,92,0,.3), inset 0 2px 8px rgba(0,0,0,.8);
}
.slot-digit-inner {
  position:absolute; top:0; left:0; right:0;
  display:flex; flex-direction:column; align-items:center;
  transition:transform .4s cubic-bezier(.25,.46,.45,.94);
}
.slot-digit-num {
  font-family:'Rajdhani',sans-serif; font-weight:700;
  font-size:30px; line-height:50px; height:50px; width:100%;
  text-align:center; flex-shrink:0;
  color:#FF7A1A;
  text-shadow:0 0 16px rgba(255,92,0,.9), 0 0 32px rgba(255,92,0,.5);
}
.slot-digit::after {
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(180deg,rgba(10,0,0,.7) 0%,transparent 30%,transparent 70%,rgba(10,0,0,.7) 100%);
  pointer-events:none;
}
.slot-separator {
  font-family:'Rajdhani',sans-serif; font-weight:700;
  font-size:24px; color:#FF7A1A; padding:0 1px; align-self:center;
  text-shadow:0 0 16px rgba(255,92,0,.8);
  opacity:.5;
}

.global-sub-jp { font-size:13px; letter-spacing:1px; color:var(--mid); margin-top:10px; font-family:'Noto Sans JP',sans-serif; }
.global-sub-en { font-size:10px; letter-spacing:3px; color:var(--dim); margin-top:4px; text-transform:uppercase; }

/* Globe */
.globe-wrap {
  position:relative; width:100%; height:320px;
  display:flex; align-items:center; justify-content:center;
  overflow:visible;
  margin:0 -16px;
  width:calc(100% + 32px);
  background:var(--black);
}
canvas#globeCanvas {
  display:block; touch-action:none;
  background:#050505;
}
.globe-label { font-size:10px; letter-spacing:4px; color:var(--dim); text-transform:uppercase; margin-top:8px; margin-bottom:18px; position:relative; z-index:2; }

/* ════ SCORE TAB ════ */
.pc-bar { display:flex; gap:8px; margin-bottom:18px; }
.pc-btn {
  flex:1; padding:10px; text-align:center;
  background:var(--dark2); color:var(--dim);
  border:1px solid var(--border); border-radius:5px;
  font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; letter-spacing:1px;
  cursor:pointer; transition:all .15s;
}
.pc-btn.active { background:var(--orange); color:var(--black); border-color:var(--orange); }
.players-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.player-card {
  background:var(--dark2); border:1px solid var(--border);
  border-radius:10px; padding:12px 10px; position:relative;
}
.player-card.hidden { display:none; }
.flash-1 { animation:f1 .5s ease-out; }
.flash-2 { animation:f2 .6s ease-out; }
.flash-3 { animation:f3 .7s ease-out; }
.flash-4 { animation:f4 1s ease-out; }
@keyframes f1 { 0%{background:#2a1a00;border-color:var(--yellow)} 100%{background:var(--dark2);border-color:var(--border)} }
@keyframes f2 { 0%,40%{background:#2e1200;border-color:var(--orange)} 100%{background:var(--dark2);border-color:var(--border)} }
@keyframes f3 { 0%,50%{background:#280010;border-color:var(--red)} 100%{background:var(--dark2);border-color:var(--border)} }
@keyframes f4 { 0%,20%,40%,60%{background:#1a0010;border-color:var(--red)} 10%,30%,50%{background:#26001e;border-color:#ff00aa} 100%{background:var(--dark2);border-color:var(--border)} }
.player-name-input {
  background:transparent; border:none; border-bottom:1px solid var(--border);
  color:#F2EFE9; font-family:'Barlow Condensed',sans-serif;
  font-size:13px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
  width:100%; margin-bottom:8px; padding-bottom:4px; outline:none;
}
.player-name-input::placeholder { color:#3a3a3a; }
.stat-label { font-size:9px; letter-spacing:2px; color:var(--dim); text-transform:uppercase; margin-bottom:2px; }
.stat-val {
  font-family:'Rajdhani',sans-serif; font-weight:700;
  font-size:42px; line-height:1; color:var(--white); text-align:center;
}
.stat-val.pop { animation:scorePop .2s ease-out; }
@keyframes scorePop { 0%{transform:scale(1.18);color:var(--orange)} 100%{transform:scale(1);color:var(--white)} }
.pts-row { margin:8px 0 10px; }
.pts-label { font-size:9px; letter-spacing:2px; color:var(--dim); text-transform:uppercase; margin-bottom:4px; }
.pts-input-row { display:flex; gap:6px; align-items:center; }
.pts-input {
  flex:1; background:var(--dark); border:1px solid var(--border); border-radius:4px;
  color:var(--yellow); font-family:'Rajdhani',sans-serif; font-weight:700;
  font-size:20px; text-align:center; padding:6px 4px; outline:none;
  -moz-appearance:textfield;
}
.pts-input::-webkit-inner-spin-button, .pts-input::-webkit-outer-spin-button { -webkit-appearance:none; }
.pts-total { font-family:'Rajdhani',sans-serif; font-weight:700; font-size:13px; color:var(--dim); white-space:nowrap; }
.pts-total span { color:var(--orange); font-size:16px; }
.score-btns { display:flex; gap:6px; }
.btn-win {
  flex:1; padding:10px 4px; background:var(--orange); color:var(--black);
  border:none; border-radius:5px;
  font-family:'Rajdhani',sans-serif; font-weight:700; font-size:15px; letter-spacing:1px;
  cursor:pointer; transition:transform .1s; touch-action:manipulation;
}
.btn-win:active { transform:scale(.93); }
.btn-minus {
  width:40px; padding:10px 0; text-align:center;
  background:transparent; color:var(--dim);
  border:1px solid var(--border); border-radius:5px;
  font-family:'Rajdhani',sans-serif; font-weight:700; font-size:20px; line-height:1;
  cursor:pointer; transition:all .1s; touch-action:manipulation;
}
.btn-minus:active { background:#1e0000; color:var(--red); border-color:var(--red); }
.reset-bar { margin-top:14px; }
.btn-reset {
  width:100%; padding:12px; background:transparent; color:var(--dim);
  border:1px solid var(--border); border-radius:5px;
  font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700;
  letter-spacing:3px; text-transform:uppercase; cursor:pointer; transition:all .2s;
}
.btn-reset:hover { color:var(--red); border-color:var(--red); }

/* confirm modal */
.confirm-modal { display:none; position:fixed; inset:0; z-index:300; background:rgba(0,0,0,.88); align-items:center; justify-content:center; }
.confirm-modal.show { display:flex; }
.confirm-box { background:var(--dark2); border:1px solid var(--border); border-radius:10px; padding:26px 22px; max-width:280px; width:90%; text-align:center; animation:overlayIn .2s ease-out; }
@keyframes overlayIn { from{opacity:0;transform:scale(.94)} to{opacity:1;transform:scale(1)} }
.confirm-title { font-family:'Rajdhani',sans-serif; font-weight:700; font-size:22px; letter-spacing:3px; color:var(--white); margin-bottom:8px; }
.confirm-sub { font-size:13px; color:var(--dim); margin-bottom:20px; line-height:1.5; }
.confirm-btns { display:flex; gap:10px; }
.confirm-yes { flex:1; padding:12px; background:var(--red); color:var(--white); border:none; border-radius:5px; font-family:'Rajdhani',sans-serif; font-weight:700; font-size:15px; cursor:pointer; }
.confirm-no  { flex:1; padding:12px; background:transparent; color:var(--dim); border:1px solid var(--border); border-radius:5px; font-family:'Rajdhani',sans-serif; font-weight:700; font-size:15px; cursor:pointer; }

/* milestone */
.confetti-wrap { position:fixed; inset:0; pointer-events:none; z-index:199; overflow:hidden; }
.confetti-wrap.hidden { display:none; }
.c-piece { position:absolute; top:-20px; border-radius:2px; animation:fall linear forwards; }
@keyframes fall { to{ transform:translateY(110vh) rotate(720deg); opacity:0; } }
.m-overlay { display:none; position:fixed; inset:0; z-index:200; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
.m-overlay.show { display:flex; animation:overlayIn .3s ease-out; }
.m-overlay.lv1 { background:rgba(8,6,0,.97); }
.m-overlay.lv2 { background:rgba(16,6,0,.97); }
.m-overlay.lv3 { background:rgba(16,0,6,.97); }
.m-overlay.lv4 { background:rgba(8,0,12,.97); }
.m-emoji { font-size:56px; margin-bottom:8px; animation:emojiPop .5s
