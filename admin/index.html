<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SENO / PRIVATE STATS</title>
  <style>
    :root {
      --black:#050505;
      --charcoal:#111;
      --panel:#171717;
      --line:#2a2a2a;
      --orange:#ff5c00;
      --amber:#f5b700;
      --text:#f3efe8;
      --muted:#8d8780;
      --dim:#5f5a54;
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      background:var(--black);
      color:var(--text);
      font-family:Arial, sans-serif;
      letter-spacing:.02em;
    }
    main { max-width:1120px; margin:0 auto; padding:28px 16px 48px; }
    header {
      display:flex; justify-content:space-between; gap:16px; align-items:flex-end;
      border-bottom:1px solid var(--line); padding-bottom:18px; margin-bottom:22px;
    }
    h1 {
      margin:0;
      font-size:22px;
      letter-spacing:.18em;
      font-weight:700;
    }
    .status {
      color:var(--orange);
      font-size:11px;
      letter-spacing:.16em;
      text-align:right;
    }
    .auth-panel {
      background:linear-gradient(180deg,#171717,#101010);
      border:1px solid var(--line);
      border-radius:8px;
      padding:16px;
      margin-bottom:14px;
      display:grid;
      grid-template-columns:1fr auto auto;
      gap:10px;
      align-items:end;
    }
    .auth-label {
      color:var(--muted);
      display:block;
      font-size:10px;
      font-weight:700;
      letter-spacing:.18em;
      margin-bottom:8px;
    }
    .auth-input {
      width:100%;
      min-height:42px;
      background:#080808;
      color:var(--text);
      border:1px solid var(--line);
      border-radius:5px;
      padding:10px 12px;
      font-size:15px;
      outline:none;
    }
    .auth-input:focus { border-color:rgba(255,92,0,.72); }
    .auth-btn {
      min-height:42px;
      border:1px solid var(--line);
      border-radius:5px;
      padding:0 16px;
      background:#0b0b0b;
      color:var(--text);
      font-size:11px;
      font-weight:700;
      letter-spacing:.16em;
      cursor:pointer;
    }
    .auth-btn.primary {
      border-color:rgba(255,92,0,.64);
      color:var(--orange);
    }
    .auth-note {
      grid-column:1 / -1;
      color:var(--dim);
      font-size:12px;
      line-height:1.6;
      margin:0;
    }
    .grid { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:14px; }
    .metric-row { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:14px; margin-bottom:14px; }
    .panel {
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:8px;
      padding:16px;
      min-width:0;
    }
    .metric .label,
    .panel-title {
      color:var(--muted);
      font-size:11px;
      letter-spacing:.18em;
      font-weight:700;
      margin-bottom:12px;
    }
    .metric .value {
      font-size:42px;
      line-height:1;
      color:var(--orange);
      font-weight:700;
      font-family:Arial, sans-serif;
    }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th {
      color:var(--dim);
      text-align:left;
      font-size:10px;
      letter-spacing:.16em;
      padding:8px 0;
      border-bottom:1px solid var(--line);
    }
    td { padding:9px 0; border-bottom:1px solid #242424; color:var(--text); }
    td:last-child, th:last-child { text-align:right; color:var(--amber); }
    .empty { color:var(--dim); font-size:13px; line-height:1.7; }
    @media (max-width:720px) {
      header { display:block; }
      .status { text-align:left; margin-top:8px; }
      .auth-panel { grid-template-columns:1fr; }
      .grid, .metric-row { grid-template-columns:1fr; }
      h1 { font-size:18px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>SENO / PRIVATE STATS</h1>
      <div class="status" id="status">LOCKED / TOKEN REQUIRED</div>
    </header>

    <section class="auth-panel" aria-label="Admin authentication">
      <label>
        <span class="auth-label">ADMIN PASSCODE</span>
        <input class="auth-input" id="adminToken" type="password" autocomplete="current-password" placeholder="Enter admin passcode">
      </label>
      <button class="auth-btn primary" id="unlockBtn" type="button">UNLOCK</button>
      <button class="auth-btn" id="clearBtn" type="button">CLEAR</button>
      <p class="auth-note">Stats data is loaded only after a valid admin passcode is sent as a Bearer token. The passcode is kept in this browser tab session only.</p>
    </section>

    <section class="metric-row">
      <div class="panel metric">
        <div class="label">VISITS</div>
        <div class="value" id="visitsTotal">0</div>
      </div>
      <div class="panel metric">
        <div class="label">PLAYS</div>
        <div class="value" id="playsTotal">0</div>
      </div>
    </section>

    <section class="grid">
      <div class="panel"><div class="panel-title">VISITS BY COUNTRY</div><table id="visitCountries"></table></div>
      <div class="panel"><div class="panel-title">PLAYS BY COUNTRY</div><table id="playCountries"></table></div>
      <div class="panel"><div class="panel-title">DAILY VISITS</div><table id="dailyVisits"></table></div>
      <div class="panel"><div class="panel-title">DAILY PLAYS</div><table id="dailyPlays"></table></div>
      <div class="panel"><div class="panel-title">WIN / DRAW</div><table id="outcomes"></table></div>
      <div class="panel"><div class="panel-title">RECENT PLAYS</div><table id="recentPlays"></table></div>
    </section>
  </main>

  <script>
    const TOKEN_STORAGE_KEY = 'seno_admin_token';
    const statusEl = document.getElementById('status');
    const tokenInput = document.getElementById('adminToken');
    const unlockBtn = document.getElementById('unlockBtn');
    const clearBtn = document.getElementById('clearBtn');

    function setText(id, value) {
      document.getElementById(id).textContent = String(value || 0);
    }

    function renderTable(id, rows, columns) {
      const table = document.getElementById(id);
      if (!rows || !rows.length) {
        table.innerHTML = '<tr><td class="empty">NO DATA</td></tr>';
        return;
      }
      const head = '<tr>' + columns.map(col => '<th>' + col.label + '</th>').join('') + '</tr>';
      const body = rows.map(row => '<tr>' + columns.map(col => '<td>' + (row[col.key] ?? '') + '</td>').join('') + '</tr>').join('');
      table.innerHTML = head + body;
    }

    function getToken() {
      return tokenInput.value.trim();
    }

    function clearToken() {
      sessionStorage.removeItem(TOKEN_STORAGE_KEY);
      tokenInput.value = '';
      statusEl.textContent = 'LOCKED / TOKEN REQUIRED';
    }

    async function loadStats() {
      const token = getToken();
      if (!token) {
        statusEl.textContent = 'LOCKED / TOKEN REQUIRED';
        return;
      }

      statusEl.textContent = 'LOADING';
      try {
        const res = await fetch('/api/admin-stats', {
          headers:{
            'Accept':'application/json',
            'Authorization':'Bearer ' + token
          },
          cache:'no-store'
        });
        if (res.status === 401) throw new Error('unauthorized');
        if (!res.ok) throw new Error('stats unavailable');
        const data = await res.json();
        sessionStorage.setItem(TOKEN_STORAGE_KEY, token);
        setText('visitsTotal', data.visitsTotal);
        setText('playsTotal', data.playsTotal);
        renderTable('visitCountries', data.visitCountries, [{ key:'code', label:'COUNTRY' }, { key:'count', label:'COUNT' }]);
        renderTable('playCountries', data.playCountries, [{ key:'code', label:'COUNTRY' }, { key:'count', label:'COUNT' }]);
        renderTable('dailyVisits', data.dailyVisits, [{ key:'day', label:'DAY' }, { key:'count', label:'COUNT' }]);
        renderTable('dailyPlays', data.dailyPlays, [{ key:'day', label:'DAY' }, { key:'count', label:'COUNT' }]);
        renderTable('outcomes', data.outcomes, [{ key:'outcome', label:'RESULT' }, { key:'count', label:'COUNT' }]);
        renderTable('recentPlays', data.recentPlays, [{ key:'code', label:'COUNTRY' }, { key:'createdAt', label:'TIME' }]);
        statusEl.textContent = 'LIVE / AUTHORIZED';
      } catch (e) {
        statusEl.textContent = e.message === 'unauthorized' ? 'LOCKED / INVALID TOKEN' : 'PREVIEW / API NOT CONNECTED';
      }
    }

    unlockBtn.addEventListener('click', loadStats);
    clearBtn.addEventListener('click', clearToken);
    tokenInput.addEventListener('keydown', event => {
      if (event.key === 'Enter') loadStats();
    });

    tokenInput.value = sessionStorage.getItem(TOKEN_STORAGE_KEY) || '';
    loadStats();
  </script>
</body>
</html>
